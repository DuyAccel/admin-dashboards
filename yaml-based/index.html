<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>OCP Admin</title>
        <link rel="stylesheet" href="styles.css" />

        <script src="extra/yaml.js"></script>
    </head>
    <body>
        <div class="container">
            <!-- Main -->
            <main class="main">
                <!-- User Info -->
                <div class="topbar">
                    <div id="userInfo"></div>
                </div>

                <h1>Execute API</h1>
                <select id="functionSelect"></select>

                <!-- YAML -->
                <div class="card">
                    <label>Input YAML</label>
                    <textarea id="yamlInput"></textarea>
                </div>

                <button id="executeBtn">Thực thi API</button>

                <!-- Response -->
                <div class="card">
                    <h3>Response</h3>
                    <p>Status: <span id="status"></span></p>
                    <p>Description: <span id="description"></span></p>

                    <table id="responseTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </main>
        </div>

        <script src="extra/function.js"></script>
        <script src="script.js"></script>
    </body>
</html>
